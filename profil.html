<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <title>REALMADU | Profile</title>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-8 space-y-6">
    <div class="flex items-center justify-between">
      <h2 class="text-2xl font-bold text-gray-800">Profil Pengguna</h2>
      <a href="halaman utama.html" class="text-sm text-blue-600 hover:underline">← Kembali ke Beranda</a>
    </div>

    <form class="space-y-4" id="profileForm">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm p-2"
          placeholder="contoh@email.com" />
      </div>

      <div>
        <label for="phone" class="block text-sm font-medium text-gray-700">Nomor Telepon</label>
        <input type="tel" id="phone" name="phone"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm p-2"
          placeholder="08xxxxxxxxxx" />
      </div>

      <div>
        <label for="address" class="block text-sm font-medium text-gray-700">Alamat Lengkap</label>
        <textarea id="address" name="address" rows="3"
          class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm p-2"
          placeholder="Alamat lengkap kamu di sini..."></textarea>
      </div>

      <div class="pt-4">
        <button type="submit" class="w-full bg-blue-600 text-white rounded-md py-2 px-4 hover:bg-blue-700 transition">
          Simpan Perubahan
        </button>
      </div>
    </form>
  </div>

  <!-- Script untuk simpan & ambil data dari localStorage -->
  <script>
    const form = document.getElementById("profileForm");

    // Muat data dari localStorage saat halaman dibuka
    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("email").value = localStorage.getItem("email") || "";
      document.getElementById("phone").value = localStorage.getItem("phone") || "";
      document.getElementById("address").value = localStorage.getItem("address") || "";
    });

    // Simpan data ke localStorage saat form disubmit
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const address = document.getElementById("address").value;

      localStorage.setItem("email", email);
      localStorage.setItem("phone", phone);
      localStorage.setItem("address", address);

      alert("Data profil berhasil disimpan!");
    });
  </script>

</body>

</html>
